      function crd(n) { return { r: Math.floor((n - 1) / 10), c: (n - 1) % 10 }; }
      function nbs(n, maxN) {
        const { r, c } = crd(n), res = [];
        for (let dr = -1; dr <= 1; dr++)for (let dc = -1; dc <= 1; dc++) {

          const rr = r + dr, cc = c + dc, nn = rr * 10 + cc + 1;

            n, freq50, drought, effDrought: +effDrought.toFixed(1), hot5,

            histScore: +histScore.toFixed(1), recScore: +recScore.toFixed(1),
            combined: +combined.toFixed(1), manual, final: 0 // Will override below
          };
        }

        // --- AKILLI MOTOR (HavuzMotoru) ENTEGRASYONU ---
        // Eski "Sayı Listesi" görünümünün hesapladığı puanı eziyor ve güncel motorun puanlarını veriyoruz
        try {
          window.HavuzMotoru.updateConfigFromUI();

      function mkGroups(sc, maxN) {
        const ranked = [...Array(maxN).keys()].map(i => i + 1)
          .map(n => {
            const entry = sc[n] || {};
            const score = (typeof entry.final === 'number' && !isNaN(entry.final)) ? entry.final : 0;
            const base = (typeof entry.base === 'number' && !isNaN(entry.base)) ? entry.base : score;
            return { n, score, base, hm_details: entry.hm_details || {} };
          })
          .sort((a, b) => b.score - a.score);
        const q1 = ranked[Math.floor(ranked.length * .25)].score || 0;
        const q2 = ranked[Math.floor(ranked.length * .50)].score || 0;
        const q3 = ranked[Math.floor(ranked.length * .75)].score || 0;
        return {
          hot: ranked.filter(x => x.score > q1), warm: ranked.filter(x => x.score > q2 && x.score <= q1),
          cold: ranked.filter(x => x.score > q3 && x.score <= q2), out: ranked.filter(x => x.score <= q3),
          th: { q1: +q1.toFixed(1), q2: +q2.toFixed(1), q3: +q3.toFixed(1) }
        };

      H.importExcel = function (input) {
        const file = input.files && input.files[0];
        if (!file) return;

        if (typeof XLSX === 'undefined') {
          const script = document.createElement('script');
          script.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
          script.onload = () => processFile(file);
          document.head.appendChild(script);
        } else {
          processFile(file);
        }

        function processFile(file) {
          const reader = new FileReader();
          reader.onload = function (e) {
            try {
              const data = new Uint8Array(e.target.result);
              const workbook = XLSX.read(data, { type: 'array' });
              const sheet = workbook.Sheets[workbook.SheetNames[0]];
              const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

              if (rows.length < 2) {
                alert('Excel dosyasında yeterli veri bulunamadı.');
                return;
              }

              const maxN = mx();
              const is90 = gm() === '90';
              const parsedEntries = [];

              for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length < 7) continue;

                const nums = [];
                for (let col = 1; col <= 6; col++) {
                  const val = parseInt(row[col], 10);
                  if (!isNaN(val) && val >= 1 && val <= maxN) {
                    nums.push(val);
                  }
                }
                nums.sort((a, b) => a - b);

                if (nums.length !== 6) continue;

                let joker = null;
                const son_15_donem = df.slice(0, 15);
                const son_11_donem = df.slice(0, 11);
                const son_7_donem = df.slice(0, 7);
                const son_3_donem = df.slice(0, 3);
                const toplam_cekilis = df.length;

                // 🃏 YENİ KURAL: Joker Etkisi
                let dateStr = '';

                if (is90) {
                  joker = parseInt(row[7], 10) || null;
                  dateStr = String(row[8] || '').trim();
                } else {
                  dateStr = String(row[7] || '').trim();
                }

                if (dateStr && !isNaN(dateStr)) {
                  const dateObj = new Date((Number(dateStr) - 25569) * 86400 * 1000);
                  if (!isNaN(dateObj.getTime())) {
                    dateStr = dateObj.toISOString().slice(0, 10);
                  }
                } else if (dateStr) {
                  const d = new Date(dateStr);
                  if (!isNaN(d.getTime())) {
                    dateStr = d.toISOString().slice(0, 10);
                  }
                }

                if (!dateStr) dateStr = new Date().toISOString().slice(0, 10);

                parsedEntries.push({ date: dateStr, nums, joker });
              }

              if (parsedEntries.length === 0) {
                alert('Geçerli çekiliş verisi ayrıştırılamadı. Excel sütun yapısını kontrol edin.');
                return;
              }

              if (!confirm(parsedEntries.length + ' adet çekiliş verisi bulundu. Veritabanına aktarmak istediğinize emin misiniz? (Mevcut veriler güncellenecektir)')) {
                return;
              }

              const db = { entries: parsedEntries };
              saveDB(db);
              H.renderDB();
              alert('Excel verisi başarıyla entegre edildi!');
            } catch (err) {
              alert('Hata oluştu: ' + err.message);
            } finally {
              input.value = '';
            }
          };
          reader.readAsArrayBuffer(file);
        }
      };

              <div style="color:#53f0db; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">📊 Etki</div>
              <p>Bu puan, final skorun yaklaşık %35'ini oluşturan temel taşıdır.</p>
            </div>` },
          { id: 'recent', name: 'Güncel', desc: `
            <div style="text-align:left">
              <div style="color:#39ff14; font-size:15px; font-weight:bold; margin-bottom:8px;">📌 Ne İşe Yarar?</div>
              <p>Son 15 çekilişte bu sayının performansı ne? Kısa vadede hareketlenen sayılar bonus alır.</p>
              <div style="color:#ffd93d; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">⚙️ Nasıl Çalışır?</div>
              <p>Son 15, son 10 ve son 5 çekilişte kaç kez çıktığı sayılır, her dönem kendi çarpanıyla toplanır.</p>
              <div style="color:#6bcb77; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">💡 Örnek</div>
              <p>35 sayısı son 5 çekilişte 2 kez çıkmışsa, "ateş topu" gibi hareket ediyor demektir — Güncel puanı çok yüksek olur.</p>
              <div style="color:#53f0db; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">📊 Etki</div>
              <p>Final skorun yaklaşık %65'ini oluşturur. Sıcak sayıları belirleyen ana güçtür.</p>
            </div>` },
          { id: 'k1', name: 'K1-Son 15', desc: `
            <div style="text-align:left">
              <div style="color:#39ff14; font-size:15px; font-weight:bold; margin-bottom:8px;">📌 Ne İşe Yarar?</div>
              <p>Sayı son 15 çekilişin herhangi birinde çıkmışsa, o çekilişin yakınlığına göre puan alır.</p>
              <div style="color:#ffd93d; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">⚙️ Nasıl Çalışır?</div>
              <p>Dün çıkan sayı en yüksek puanı alırken, 14 çekiliş önce çıkan sayı en düşük puanı alır. Yakınlık = Güç.</p>
              <div style="color:#6bcb77; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">💡 Örnek</div>
              <p>45 sayısı 2 çekiliş önce çıktıysa ağırlığı yüksek → K1 puanı yüksek. 13 çekiliş önce çıktıysa → K1 puanı düşük.</p>
              <div style="color:#53f0db; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">📊 Etki</div>
              <p>Çarpanı: Varsayılan ×2.0 (Ayarlardan değiştirilebilir).</p>
            </div>` },
          { id: 'k2', name: 'K2-Son 10', desc: `
            <div style="text-align:left">
              <div style="color:#39ff14; font-size:15px; font-weight:bold; margin-bottom:8px;">📌 Ne İşe Yarar?</div>
              <p>Son 10 çekilişte çıkan sayılara ekstra "sıcak bölge" taban puanı verir.</p>
              <div style="color:#ffd93d; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">⚙️ Nasıl Çalışır?</div>
              <p>Son 10 çekilişte 1 kez, 2 kez veya 3+ kez çıkmasına göre farklı kademeli puanlar verilir.</p>
              <div style="color:#6bcb77; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">💡 Örnek</div>
              <p>28 sayısı son 10 çekilişte 2 kez çıkmışsa, "tutarlı sıcak" sayıdır — güçlü K2 puanı alır.</p>
              <div style="color:#53f0db; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">📊 Etki</div>
              <p>Çarpanı: Varsayılan ×3.5 (Ayarlardan değiştirilebilir).</p>
            </div>` },
          { id: 'k3', name: 'K3-Son 5', desc: `
            <div style="text-align:left">
              <div style="color:#39ff14; font-size:15px; font-weight:bold; margin-bottom:8px;">📌 Ne İşe Yarar?</div>
              <p>Son 5 çekilişte çıkan sayılara en yüksek ateş topu bonusu verir.</p>
              <div style="color:#ffd93d; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">⚙️ Nasıl Çalışır?</div>
              <p>Bu sayılar "şu an yanan" sayılardır. Çarpan en yüksek değerdedir.</p>
              <div style="color:#6bcb77; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">💡 Örnek</div>
              <p>15 sayısı son 3. çekilişte çıktıysa K3 puanı alır. Son 5 çekilişin dışındaysa K3 = 0.</p>
              <div style="color:#53f0db; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">📊 Etki</div>
              <p>Çarpanı: Varsayılan ×5.0 (Ayarlardan değiştirilebilir). En güçlü bonus.</p>
            </div>` },
          { id: 'k4', name: 'K4-Kuraklık', desc: `
            <div style="text-align:left">
              <div style="color:#39ff14; font-size:15px; font-weight:bold; margin-bottom:8px;">📌 Ne İşe Yarar?</div>
              <p>Uzun süredir çıkmayan sayılar önce bonus, çok uzun süre çıkmazsa ceza alır.</p>
              <div style="color:#ffd93d; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">⚙️ Nasıl Çalışır?</div>
              <p>5–16 çekiliştir çıkmayan sayı "Altın Aralık" bonusu alır (zamanı geldi mantığı). Belirlenen Ölüm Sınırından fazla süredir çıkmayan "ölü sayı" ilan edilir ve ağır ceza yer.</p>
              <div style="color:#6bcb77; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">💡 Örnek</div>
              <p>67 sayısı 12 çekiliştir gelmiyorsa → +40 puan (Altın Aralık, patlamaya hazır). Ama 50 çekiliştir gelmiyorsa → Ceza (ölü sayı).</p>
              <div style="color:#53f0db; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">📊 Etki</div>
              <p>Bonus: +10 ile +40 arası. Ceza: Ölüm sınırı aşılırsa negatif puan.</p>
            </div>` },
          { id: 'k5', name: 'K5-Joker', desc: `
            <div style="text-align:left">
              <div style="color:#39ff14; font-size:15px; font-weight:bold; margin-bottom:8px;">📌 Ne İşe Yarar?</div>
              <p>Joker olarak çıkan sayılar ve onların komşuları puan alır.</p>
              <div style="color:#ffd93d; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">⚙️ Nasıl Çalışır?</div>
              <p>Son 15 çekilişte joker olan her sayı, yakınlığına göre ağırlıklı puan alır. Jokerin grid komşuları da ekstra puan alır.</p>
              <div style="color:#6bcb77; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">💡 Örnek</div>
              <p>Son çekilişte Joker = 42 ise, 42 sayısı tam puan, komşuları 41, 43, 32 vb. daha düşük puan alır.</p>
              <div style="color:#53f0db; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">📊 Etki</div>
              <p>Çarpanı: Varsayılan ×5.0 (Ayarlardan değiştirilebilir).</p>
            </div>` },
          { id: 'k6', name: 'K6-1.Halka', desc: `
            <div style="text-align:left">
              <div style="color:#39ff14; font-size:15px; font-weight:bold; margin-bottom:8px;">📌 Ne İşe Yarar?</div>
              <p>Son 3 çekilişte çıkan sayıların hemen bitişiğindeki sayılara verilen komşuluk puanıdır. Bir sayı ne kadar çok sayının komşusuysa o kadar yüksek puan alır.</p>
              <div style="color:#ffd93d; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">⚙️ Nasıl Çalışır?</div>
              <p>9x10 grid üzerinde her sayının 8 komşusu olabilir. Son 3 çekilişte çıkan her sayı için komşuları bulunur. Sınır yoktur.</p>
              <div style="color:#6bcb77; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">💡 Örnek</div>
              <p>Son çekilişte 45, 65, 53 çıktı. 54 sayısı 45'in de, 65'in de, 53'ün de komşusu → 3 × Puan alır. Ama 88 hiçbirinin komşusu değil → Puan = 0.</p>
              <div style="color:#53f0db; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">📊 Etki</div>
              <p>Birim puan: Varsayılan 5 (Ayarlardan değiştirilebilir). Komşu sayısı arttıkça puan da artar.</p>
            </div>` },
          { id: 'k7', name: 'K7-2.Halka', desc: `
            <div style="text-align:left">
              <div style="color:#39ff14; font-size:15px; font-weight:bold; margin-bottom:8px;">📌 Ne İşe Yarar?</div>
              <p>1. halkanın bir adım daha uzağındaki sayılara verilen ikinci seviye komşuluk puanıdır.</p>
              <div style="color:#ffd93d; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">⚙️ Nasıl Çalışır?</div>
              <p>K6 ile aynı mantık ama mesafe 2 adım: yatay ±2, dikey ±20, çapraz ±18/±22. Grid sınır kontrolleri aynen uygulanır.</p>
              <div style="color:#6bcb77; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">💡 Örnek</div>
              <p>Son çekilişte 45 çıktı. 2. halka komşuları: 43, 47, 25, 65, vb. Bu sayılar K7 puanı alır.</p>
              <div style="color:#53f0db; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">📊 Etki</div>
              <p>Birim puan: Varsayılan 2 (Ayarlardan değiştirilebilir).</p>
            </div>` },
          { id: 'k8', name: 'K8-Onluk Blok', desc: `
            <div style="text-align:left">
              <div style="color:#39ff14; font-size:15px; font-weight:bold; margin-bottom:8px;">📌 Ne İşe Yarar?</div>
              <p>Son 2 çekilişte hiç sayı çıkmayan onluk bloklar (1-10, 11-20, ...) bonus alır.</p>
              <div style="color:#ffd93d; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">⚙️ Nasıl Çalışır?</div>
              <p>90 sayı 9 bloğa ayrılır. Hangi bloktan hiç sayı çıkmadıysa, o bloktaki tüm sayılara bonus verilir.</p>
              <div style="color:#6bcb77; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">💡 Örnek</div>
              <p>Son 2 çekilişte 40-49 arasından hiç sayı çıkmadıysa, 40, 41, 42... 49 hepsi bonus alır.</p>
              <div style="color:#53f0db; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">📊 Etki</div>
              <p>Sabit bonus: Varsayılan +10 (Ayarlardan değiştirilebilir).</p>
            </div>` },
          { id: 'k9', name: 'K9-Kinetik', desc: `
            <div style="text-align:left">
              <div style="color:#39ff14; font-size:15px; font-weight:bold; margin-bottom:8px;">📌 Ne İşe Yarar?</div>
              <p>Zaten sıcak olan, yakın zamanda çıkmış olan bir sayının hareket hızına bakılır.</p>
              <div style="color:#ffd93d; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">⚙️ Nasıl Çalışır?</div>
              <p>Sayı son 10 çekilişte yoğunlaşmışsa, bu kural sayıya arkadan bir rüzgar (ivme) verir.</p>
              <div style="color:#6bcb77; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">💡 Örnek</div>
              <p>Bir sayı son zamanlarda 3 kere gelmişse kinetik enerjisi yüksektir ve bonusu kapar.</p>
              <div style="color:#53f0db; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">📊 Etki</div>
              <p>Sabit bonus: Varsayılan +50 (Ayarlardan değiştirilebilir).</p>
            </div>` },
          { id: 'k10', name: 'K10-Gecikmeli', desc: `
            <div style="text-align:left">
              <div style="color:#39ff14; font-size:15px; font-weight:bold; margin-bottom:8px;">📌 Ne İşe Yarar?</div>
              <p>Geçmişte çok sık çıkmış ama nedense son 5 çekilişte birden bire susmuş sayılara verilen gizli tehlike bonusudur.</p>
              <div style="color:#ffd93d; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">⚙️ Nasıl Çalışır?</div>
              <p>İlk 10 çekiliş dilimindeki performansıyla son 5'teki yokluğu kıyaslanır.</p>
              <div style="color:#6bcb77; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">💡 Örnek</div>
              <p>12 sayısı geçen ay hep çıkıyordu ama bu hafta hiç yok. "Bir zamanların şampiyonu dinleniyor, dönebilir" puanıdır.</p>
              <div style="color:#53f0db; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">📊 Etki</div>
              <p>Bonus puan: Varsayılan +18 (Ayarlardan değiştirilebilir).</p>
            </div>` },
          { id: 'k11', name: 'K11-Bölge', desc: `
            <div style="text-align:left">
              <div style="color:#39ff14; font-size:15px; font-weight:bold; margin-bottom:8px;">📌 Ne İşe Yarar?</div>
              <p>Sayıların ağırlık merkezi hep küçük sayılardaysa, makine bir sonraki çekilişin "Büyük" sayılara kayacağını tahmin eder.</p>
              <div style="color:#ffd93d; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">⚙️ Nasıl Çalışır?</div>
              <p>Sarkaç dengesi. Sarkaç büyük sayılara doğru kayıyorsa, büyük sayılar buradan puan alır. Tam tersi de geçerlidir.</p>
              <div style="color:#6bcb77; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">💡 Örnek</div>
              <p>Son 3 çekilişte hep 1-45 arası sayılar çıktıysa, 46-90 arası sayılara Bölge puanı verilir.</p>
              <div style="color:#53f0db; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">📊 Etki</div>
              <p>Bonus puan: Varsayılan +12 (Ayarlardan değiştirilebilir).</p>
            </div>` },
          { id: 'k12', name: 'K12-Aşırı Isınma', desc: `
            <div style="text-align:left">
              <div style="color:#39ff14; font-size:15px; font-weight:bold; margin-bottom:8px;">📌 Ne İşe Yarar?</div>
              <p>Bir sayı son zamanlarda sürekli çıkıyorsa ama artık enerjisini tamamen tüketmişse devasa bir ceza alır.</p>
              <div style="color:#ffd93d; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">⚙️ Nasıl Çalışır?</div>
              <p>Tarihsel olarak zayıf olan "Yalancı Sıcak" sayılar bu kuralda infaz edilir.</p>
              <div style="color:#6bcb77; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">💡 Örnek</div>
              <p>Makine "Bu sayı artık çok çıktı, bir süre daha gelmez" der ve puanını kırar.</p>
              <div style="color:#53f0db; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">📊 Etki</div>
              <p>Ceza puanı: Varsayılan -45 (Ayarlardan değiştirilebilir).</p>
            </div>` },
          { id: 'k13', name: 'K13-Çifte Tek.', desc: `
            <div style="text-align:left">
              <div style="color:#39ff14; font-size:15px; font-weight:bold; margin-bottom:8px;">📌 Ne İşe Yarar?</div>
              <p>Bir sayı eğer art arda son iki çekilişin ikisinde birden çıkmışsa ceza yer.</p>
              <div style="color:#ffd93d; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">⚙️ Nasıl Çalışır?</div>
              <p>Üçüncü kez arka arkaya çıkma ihtimali istatistiksel olarak çok düşük olduğu için havuzdan büyük ölçüde atılır.</p>
              <div style="color:#6bcb77; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">💡 Örnek</div>
              <p>19 sayısı hem dün hem önceki gün çıktıysa, bugün çıkma ihtimali düşüktür.</p>
              <div style="color:#53f0db; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">📊 Etki</div>
              <p>Ceza puanı: Varsayılan -30 (Ayarlardan değiştirilebilir).</p>
            </div>` },
          { id: 'k14', name: 'K14-Doygunluk', desc: `
            <div style="text-align:left">
              <div style="color:#39ff14; font-size:15px; font-weight:bold; margin-bottom:8px;">📌 Ne İşe Yarar?</div>
              <p>Kısa süre içinde o kadar çok çıkmıştır ki, sayı artık tamamen "doymuş" kabul edilir.</p>
              <div style="color:#ffd93d; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">⚙️ Nasıl Çalışır?</div>
              <p>Doygunluk seviyesine göre (Doygun 4, Doygun 8 vb.) gittikçe ağırlaşan çok sert eksi puanlar alır.</p>
              <div style="color:#6bcb77; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">💡 Örnek</div>
              <p>Bir sayı son 15 çekilişte 5 kere gelmişse, gelme olasılığı doymuştur.</p>
              <div style="color:#53f0db; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">📊 Etki</div>
              <p>Ceza puanı: Varsayılan -150'den başlar, -500'e kadar gider.</p>
            </div>` },
          { id: 'k15', name: 'K15-TamIsınma', desc: `
            <div style="text-align:left">
              <div style="color:#39ff14; font-size:15px; font-weight:bold; margin-bottom:8px;">📌 Ne İşe Yarar?</div>
              <p>Hem joker hem de komşu avantajını birleştiren sayılara verilen nadir sinerji puanıdır.</p>
              <div style="color:#ffd93d; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">⚙️ Nasıl Çalışır?</div>
              <p>Makine bu iki gücün aynı sayıda birleştiğini fark ettiğinde, ekstra sinerji bonusu uygular.</p>
              <div style="color:#6bcb77; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">💡 Örnek</div>
              <p>7 sayısı hem yakın zamanda joker çıkmış hem de son sayıların komşusuysa devasa ödül alır.</p>
              <div style="color:#53f0db; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">📊 Etki</div>
              <p>Devasa bonus puanı sağlar.</p>
            </div>` },
          { id: 'k16', name: 'K16-İzolasyon', desc: `
            <div style="text-align:left">
              <div style="color:#39ff14; font-size:15px; font-weight:bold; margin-bottom:8px;">📌 Ne İşe Yarar?</div>
              <p>Yakın zamanda çıkmış gibi görünen ama diğer hiçbir sayıyla bağı (komşuluğu) olmayan sayılara ceza verir.</p>
              <div style="color:#ffd93d; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">⚙️ Nasıl Çalışır?</div>
              <p>Bu "İzole" sayılar sahte sıcak kabul edilir ve makine tarafından İzolasyon cezasına çarptırılır.</p>
              <div style="color:#6bcb77; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">💡 Örnek</div>
              <p>Sayı çıkmış ama 1. ve 2. halka komşularında hiçbir hareketlilik yok.</p>
              <div style="color:#53f0db; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">📊 Etki</div>
              <p>Ceza puanı: Varsayılan -100 (Ayarlardan değiştirilebilir).</p>
            </div>` },
          { id: 'k17', name: 'K17-ÇaprazKur', desc: `
            <div style="text-align:left">
              <div style="color:#39ff14; font-size:15px; font-weight:bold; margin-bottom:8px;">📌 Ne İşe Yarar?</div>
              <p>Kendisi ve çapraz komşuları çok uzun süredir gelmeyen sayılara verilen patlama bonusudur.</p>
              <div style="color:#ffd93d; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">⚙️ Nasıl Çalışır?</div>
              <p>O bölgede inanılmaz bir enerji birikimi oluşmuştur. Gizli kalmış bomba sayıları tespit etme kuralıdır.</p>
              <div style="color:#6bcb77; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">💡 Örnek</div>
              <p>45 ve çaprazlarındaki 34, 36, 54, 56 uzun süredir çıkmadıysa 45 bomba sayıdır.</p>
              <div style="color:#53f0db; font-size:15px; font-weight:bold; margin-bottom:8px; margin-top:15px;">📊 Etki</div>

  <script>

      },
      config: {
        YUZDE_SON_15_DONEM: 65,
        YUZDE_TUM_GECMIS: 35,
        CARPAN_15: 2.0,
        CARPAN_10: 3.5,
        CARPAN_5: 5.0,
        CARPAN_KURAKLIK: 0,
        CARPAN_JOKER: 0, // <-- YENI EKLENEN JOKER CARPANI
        PUAN_1_HALKA_KOMSU: 0, // Eski ajanin hatasiyla 0 idi, boyle birakildi
        PUAN_GECIKMELI_TEKRAR: 0,
        PUAN_BOLGE_GECISI: 0,
        CEZA_OLU_SAYI_4: 0,
        CEZA_CIFTE_TEKRAR: 0,

        CEZA_DOYGUN_8: 0,

        // Seçenek 1+2: Normalizasyon limitleri
